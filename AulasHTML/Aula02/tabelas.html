<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
</head>
<body>
    <table border="1">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Idade</th>
                <th>Cidade</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Isadora</td>
                <td>21</td>
                <td>São Paulo</td>
            </tr>

            <tr>
                <td>Jefferson</td>
                <td>31</td>
                <td>São Paulo</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td colspan="3">Total de pessoas: 2</td>
            </tr>
        </tfoot>
    </table>
    
</body>
</html>
