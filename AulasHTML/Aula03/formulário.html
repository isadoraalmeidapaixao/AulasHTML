<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários HTML</title>
</head>
<body>
    <form name="cadastroForm" action="/processarDados" method ="post"
    autocomplete="on">
        <!--Campo de texto para inserção de dados -->

        <!--Nome-->
        <label for="nome">Nome:</label>
 
        <input type="text" name="nome" id="nome"/>

        <br/>
        <!--Email-->
        <label for="email">Email:</label>
 
        <input
        required
        type="text"
        name="email"
        id=""
        placeholder="Ex: email@dominio.com"/>

        <br/>
        <!--Telefone-->
        <label for="telefone">Telefone</label>
        <input type="tel" name="tel" id=""
        placeholder="(xx) xxxxx-xxxx"/>
        
        <br/>

        <!--Senha-->
        <label for="senha">Senha:</label>
        <input type="password" name="senha"/>
        <br/>

        <label for="idade">Idade:</label>
        <input type="number" name="idade" id="idade"/>
        <br/>
        
        <label for="nascimento">Nascimento</label>
        <input type="date" name="nascimento"/>
        <br/>
        <label for="horario">Hora</label>
        <input type="time" name="horario" id="horario"/>

        <br/>
        <label for="color">Cor</label>
        <input type="color" name="color" id="color"/>
        <br/>
        <label for="range">Range</label>
        <input
        oninput="this.nextElementSibling.textContent = this.value"
        type="range"
        min="0"
        max="100"
        value="25"
        name="range"
        id="range"/>
        <h1>25</h1>
        <br/>

        <input type="file" accept="image/*" name="file" id="file"/>
        <br/>

        <input type="reset" name="limpar" id="limpar">
        <br/>

        <label for="checkbox">Aceito os termos</label>
        <input type="checkbox" name="termos" id=""/>
        <br/>

        <input type="radio" name="genero" id="masculino"/>
        <label for="masculino">Masculino</label>
        <br/>
        <input type="radio" name="genero" id="masculino"/>
        <label for="feminino">Feminino</label>
        <br/>

        <input type="mensagem">Mensagem:</label>
        <textarea name="mensagem" id="Mensagem" rows="5">
        </textarea>
        <br/><br/>
        
        <label for="cidade">Cidade</label>
        <select name="cidade" id="cidade">
            <option value="saopaulo">Sao Paulo</option>
            <option value="rio">Rio de Janeiro</option>
        </select>
        <br/><br/>

        <label for="linguagens">linguagens de programação</label>
        <select name="linguagens" id="linguagens">
            <option value="c#">C#</option>
            <option value="python">Python</option>
            <option value="java">Java</option>
        </select>


        <br/><br/>
        <!--Enviar-->
        <input type="submit" value="Enviar"/>
        

    </form>
</body>
</html>
