<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>
        <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

        <div class="container">
        <div class="card">

            <h1 class="titulo">Cadastrar</h1>

            <form class="form">

                <div class="campos">
                    <label>Nome</label>
                    <input type="nome" placeholder="Digite o nome completo">
                </div>

                <div class="campos">
                    <label>E-mail</label>
                    <input type="email" placeholder="Digite o email">
                </div>

                <div class="campos">
                    <label>Senha</label>
                    <input type="password" placeholder="Digite a senha">
                </div>

                    <button class="botaoCadastrar">Cadastrar</button>             

            </form>

        </div>
    </div>
    
</body>
</html>
